services:
  app:
    build: .
    image: ghcr.io/sachinsharma-lordheydes/vanijay-buyer:latest
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-VanijayvpsPass123buyerseller}
      POSTGRES_DB: ${POSTGRES_DB:-vanijay_buyer_seller}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  default:
    name: vanijay-network
