services:
  app:
    container_name: vanijay_buyer
    build: .
    image: ghcr.io/mis-takely/vanijay-buyer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # Expose to localhost only, for host Nginx to proxy
    env_file: .env
    depends_on:
      - db
      - soketi

  db:
    container_name: vanijay_buyer_seller_database
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-VanijayvpsPass123buyerseller}
      POSTGRES_DB: ${POSTGRES_DB:-vanijay_buyer_seller}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Expose to localhost if needed for local tools, strictly optional

  soketi:
    container_name: vanijay_soketi
    image: quay.io/soketi/soketi:1.6-16-debian
    restart: unless-stopped
    ports:
      - "127.0.0.1:6001:6001"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: "vanijay-app"
      SOKETI_DEFAULT_APP_KEY: "vanijay-key"
      SOKETI_DEFAULT_APP_SECRET: "vanijay-secret"

volumes:
  postgres_data:

networks:
  default:
    name: vanijay-network
